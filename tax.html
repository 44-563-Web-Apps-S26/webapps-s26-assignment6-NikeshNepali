<!DOCTYPE html>
<html>
 <head>
    <title> Tax table </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
 </head>
 
<body>

<h2 class="fw-bold text-success">Tax Table Computation Nikesh Nepali</h2>

<form>
    <label for="income" class="form-label">Enter Income: </label>
    <input class="form-control"  type ="number" id="income" name="amount_of_income" value=5000> <br>

    <label for="base_rate" class="form-label">Enter the Base tax Rate: </label>
    <input class="form-control"  type ="number" id="base_rate" name="base_rate" value=0.05> <br>

    <label for="cutOff" class="form-label">Enter the Cut off: </label>
    <input class="form-control"  type="number" id="cutOff" name="cutOff" value=7500> <br>

    <label for="extRate" class="form-label">Enter the extended rate: </label>
    <input class="form-control"  type="number" id="extRate" name="extRate" value=0.15>

    <input class="btn btn-primary px-4" type="button" onclick="doTax()" value="Show Tax table">
</form>


<p id="result" class="alert alert-info mt-3">Result </p>

<form>
    <h5 class="card-title mb-3">Choose Operation</h5>

        <input class="form-check-input" type="radio" id="rg1_power" value="exponent" name="math"  onclick="chooseOp()" >
        <label class="form-check-label" for="rg1_Power">Power</label></br>
      
        <input class="form-check-input" type="radio" id="rg1_add" 
           value="add" name ="math" onclick="chooseOp()">
        <label class="form-check-label" for="rg1_add">Add</label></br>
      
        <input class="form-check-input" type="radio" id="rg1_mod"   
           value="mod" name="math" onclick="chooseOp()">
        <label class="form-check-label" for="rg1_mod">Mod</label></br>
</form>

      <p id="Rg_btn" class="alert alert-secondary">abc</p>

      <a href="trip.html" class="btn btn-outline-success me-2 px-4">Trip</a>
      <a href="villian.html" class="btn btn-outline-primary px-4">Villian</a>

<script> 

function doTax (){
    income = document.getElementById("income").value
    base_rate = document.getElementById("base_rate").value
    cutOff = document.getElementById("cutOff").value
    ext_rate = document.getElementById("extRate").value
    let taxTable = "";

    result = document.getElementById("result");
    
    let incomeLevel = 0;
    for(let i = 1; i <= 5; i++){
        incomeLevel = i * income;
        if(incomeLevel > cutOff){
            calculated = (cutOff * base_rate ) + ((incomeLevel - cutOff) * ext_rate );
        }else{
            calculated = incomeLevel * base_rate;
        }
        taxTable += `incomeLevel ${incomeLevel} tax is ${calculated} `
    }
    result.innerHTML = "Tax table " + taxTable;
}

function chooseOp(){
    let income = Number(document.getElementById("income").value);
    let base_rate = Number(document.getElementById("base_rate").value);
    power = document.getElementById("rg1_power")
    add = document.getElementById("rg1_add")
    mod = document.getElementById("rg1_mod")

    res = document.getElementById("Rg_btn");
    if(power.checked){
        out = Math.pow(income,base_rate);
        res.innerHTML = `${income} power ${base_rate} is: ${out}`
    }else if(add.checked){
        out = income + base_rate;
        res.innerHTML = `${income} add ${base_rate} is: ${out}`
    }else{
        out = income % base_rate;
        res.innerHTML = `${income} mod ${base_rate} is: ${out}`
    }

}
</script>

</body>
</html>
