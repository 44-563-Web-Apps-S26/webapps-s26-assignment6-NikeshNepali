<!DOCTYPE html>
<html>
    <head>
        <title>Traveller's Page</title>
    </head>
 
<body>

<h2>Nikesh Nepali Travel Planner</h2>
<form>
    <input type="checkbox" id="Caribbean" name="plan1" value= true >
    <label for="Caribbean">Carribean</label>

    <input type="checkbox" id="Mediterranean" name = "plan2" value= true>
    <label for="Mediterranean">Mediterranean</label>

    <input type="checkbox" id="Baltic" name="plan3" value= false>
    <label for="Baltic">Baltic</label>

    <input type="button" value="Cruise Choices" onclick="choices()">
</form>
<div id="checkboxResult">Result</div>
<form>
    <label for="form1_age">What is your age </label>
    <input type ="number" id="form1_age" name="form1_age" min=10 max=50 step=2 value=30> <br>

    <label for="form1_nick">What is your nickname </label>
    <input type ="text" id="form1_nick" name="form1_nick" autofocus> <br>

    <input type="button" onclick="resolveForm()" value="Get values from form">
</form>


<p id="result">This text will be replaced </p>

<script> 
var myTrip = {};
function choices(){
    myTrip = {};
    checkResult = document.getElementById("checkboxResult");
    myTrip.cari = document.getElementById("Caribbean").checked;
    myTrip.medi = document.getElementById("Mediterranean").checked;
    myTrip.balt = document.getElementById("Baltic").checked;

    res = "";
    for(let key in myTrip){
        res += `${key}: ${myTrip[key]}, <br> `
    }
    
    checkResult.innerHTML = res + '<br>';
}

function resolveForm (){
    console.log("Getting form values")
    age = document.getElementById("form1_age").value
    nick = document.getElementById("form1_nick").value
    confirmed = confirm("Are these the values? "+age+" and "+nick)
    
    out = document.getElementById("result")
    if(confirmed){
        out.innerHTML = "Values were confirmed"
    } else {
        out.innerHTML = "Values were not confirmed"
    }
}
</script>

</body>
</html>
