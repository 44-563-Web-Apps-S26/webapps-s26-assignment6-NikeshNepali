<!DOCTYPE html>
<html>
    <head>
        <title>Traveller's Page</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </head>
 
<body>

<h2 class="fw-bold text-primary">Nikesh Nepali Travel Planner</h2>
<form>
    <h5 class="card-title mb-3">Select Cruise Options</h5>
    <input class="form-check-input" type="checkbox" id="Caribbean" name="plan1"  value= true >
    <label class="form-check-label" for="Caribbean">Carribean</label>

    <input class="form-check-input" type="checkbox" id="Mediterranean" name = "plan2" value= true>
    <label class="form-check-label" for="Mediterranean">Mediterranean</label>

    <input class="form-check-input" type="checkbox" id="Baltic" name="plan3" value= false>
    <label class="form-check-label" for="Baltic">Baltic</label>

    <input class="btn btn-primary"  type="button" value="Cruise Choices" onclick="choices()">
</form>
<div id="checkboxResult" class="alert alert-info mt-3">Result</div>
<form>
    <h5 class="card-title mb-3">Update Your Trip</h5>
    <label for="City1" class="form-label">Enter Starting City: </label>
    <input class="form-control" type ="text" id="City1" name="origin_city" value="Athens"> <br>

    <label for="City2" class="form-label">Enter Ending City: </label>
    <input class="form-control" type ="text" id="City2" name="terminal_city"> <br>

    <input class="btn btn-success" type="button" onclick="updateTrip()" value="Update the Trip">
</form>


<p id="result" class="mt-3 fw-semibold text-secondary">This text will be replaced </p>

<a href="villian.html" class="btn btn-outline-primary me-2 px-4">Villian Page</a>
<a href="tax.html" class="btn btn-outline-dark px-4">Tax Page</a>

<script> 
var myTrip = {};
function choices(){
    myTrip = {};
    checkResult = document.getElementById("checkboxResult");
    myTrip.cari = document.getElementById("Caribbean").checked;
    myTrip.medi = document.getElementById("Mediterranean").checked;
    myTrip.balt = document.getElementById("Baltic").checked;

    res = "";
    for(let key in myTrip){
        res += `${key}: ${myTrip[key]}, <br> `
    }    
    checkResult.innerHTML = res;
}

function updateTrip(){
    myTrip.startCity = document.getElementsByName("origin_city")[0].value;
    myTrip.endCity = document.getElementsByName("terminal_city")[0].value;

    result = document.getElementById("result");
    
    res = "The Start City is " + myTrip.startCity + " End City is " + myTrip.endCity;
    
    result.innerHTML = res;
}
</script>

</body>
</html>
