<!DOCTYPE html>
<html>
    <head>
        <title>Traveller's Page</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" 
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" 
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </head>
 
<body>

<h2>Nikesh Nepali Travel Planner</h2>
<form>
    <input type="checkbox" id="Caribbean" name="plan1" value= true >
    <label for="Caribbean">Carribean</label>

    <input type="checkbox" id="Mediterranean" name = "plan2" value= true>
    <label for="Mediterranean">Mediterranean</label>

    <input type="checkbox" id="Baltic" name="plan3" value= false>
    <label for="Baltic">Baltic</label>

    <input type="button" value="Cruise Choices" onclick="choices()">
</form>
<div id="checkboxResult">Result</div>
<form>
    <label for="City1">Enter Starting City: </label>
    <input type ="text" id="City1" name="origin_city" value="Athens"> <br>

    <label for="City2">Enter Ending City: </label>
    <input type ="text" id="City2" name="terminal_city"> <br>

    <input type="button" onclick="updateTrip()" value="Update the Trip">
</form>


<p id="result">This text will be replaced </p>

<a href="villian.html">Villian Page</a>
<a href="tax.html">Tax Page</a>

<script> 
var myTrip = {};
function choices(){
    myTrip = {};
    checkResult = document.getElementById("checkboxResult");
    myTrip.cari = document.getElementById("Caribbean").checked;
    myTrip.medi = document.getElementById("Mediterranean").checked;
    myTrip.balt = document.getElementById("Baltic").checked;

    res = "";
    for(let key in myTrip){
        res += `${key}: ${myTrip[key]}, <br> `
    }    
    checkResult.innerHTML = res;
}

function updateTrip(){
    myTrip.startCity = document.getElementsByName("origin_city")[0].value;
    myTrip.endCity = document.getElementsByName("terminal_city")[0].value;

    result = document.getElementById("result");
    
    res = "The Start City is " + myTrip.startCity + " End City is " + myTrip.endCity;
    
    result.innerHTML = res;
}
</script>

</body>
</html>
